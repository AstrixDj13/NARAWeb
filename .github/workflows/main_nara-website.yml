# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - nara-website

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: npm install, build, and test
        env:
          VITE_STOREFRONT_ACCESS_TOKEN: ${{ secrets.VITE_STOREFRONT_ACCESS_TOKEN }}
          VITE_ANTHROPIC_API_KEY: ${{ secrets.VITE_ANTHROPIC_API_KEY }}
          VITE_STORE_URL: ${{ secrets.VITE_STORE_URL }}
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Prepare Deployment Artifacts
        run: |
          mkdir deploy
          cp -r dist deploy/
          cp -r server deploy/
          cp package.json deploy/
          cp package-lock.json deploy/
          cd deploy
          npm install --omit=dev

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_63F551C46E564AA3BBC9C1BE38343A0E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_30837265B52B456990B846FB8AED1F8F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_0884A65D5E4D49FE8070AE18F25E050F }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'nara-website'
          slot-name: 'Production'
          package: .
        env:
          SCM_DO_BUILD_DURING_DEPLOYMENT: false
          